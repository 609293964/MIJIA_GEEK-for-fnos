<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MIJIA GEEK CODE - Web版</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    #mijia-passcode-panel {
      width: 100%;
      max-width: 420px;
      color: #ffffff;
      position: relative;
    }

    #mijia-passcode-panel * {
      box-sizing: border-box;
    }

    #mijia-passcode-panel button,
    #mijia-passcode-panel input,
    #mijia-passcode-panel textarea {
      font: inherit;
    }

    #mijia-passcode-panel .mini-toggle {
      display: none;
    }

    #mijia-passcode-panel .card {
      display: block;
      border-radius: 24px;
      overflow: hidden;
      background: #171717;
      box-shadow: 0 20px 56px rgba(0, 0, 0, 0.32);
    }

    #mijia-passcode-panel .card-inner {
      padding: 28px 20px 22px;
      display: grid;
      gap: 18px;
    }

    #mijia-passcode-panel .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #mijia-passcode-panel .header-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    #mijia-passcode-panel .title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      user-select: none;
    }

    #mijia-passcode-panel .title-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      color: #c9e3ff;
      background: rgba(47, 124, 255, 0.16);
      font-size: 12px;
      white-space: nowrap;
    }

    #mijia-passcode-panel .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #mijia-passcode-panel .header-button,
    #mijia-passcode-panel .icon-button,
    #mijia-passcode-panel .action-button,
    #mijia-passcode-panel .small-button,
    #mijia-passcode-panel .secondary-button,
    #mijia-passcode-panel .primary-button {
      border: 0;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    #mijia-passcode-panel .header-button:hover,
    #mijia-passcode-panel .icon-button:hover,
    #mijia-passcode-panel .action-button:hover,
    #mijia-passcode-panel .small-button:hover,
    #mijia-passcode-panel .secondary-button:hover,
    #mijia-passcode-panel .primary-button:hover {
      transform: translateY(-1px);
    }

    #mijia-passcode-panel .header-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.76);
      background: rgba(255, 255, 255, 0.06);
      font-size: 14px;
    }

    #mijia-passcode-panel .icon-button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      display: none;
    }

    #mijia-passcode-panel .field {
      display: grid;
      gap: 8px;
    }

    #mijia-passcode-panel .settings-section {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
    }

    #mijia-passcode-panel .section-title {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.02em;
    }

    #mijia-passcode-panel .field-note {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.6);
    }

    #mijia-passcode-panel .field-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    #mijia-passcode-panel .field-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.76);
    }

    #mijia-passcode-panel .text-input,
    #mijia-passcode-panel .textarea-input,
    #mijia-passcode-panel .link-box,
    #mijia-passcode-panel .passcode-box {
      width: 100%;
      border: 0;
      border-radius: 20px;
      background: #444444;
      color: #ffffff;
    }

    #mijia-passcode-panel .text-input,
    #mijia-passcode-panel .textarea-input {
      padding: 12px 14px;
      line-height: 1.6;
    }

    #mijia-passcode-panel .textarea-input {
      min-height: 140px;
      resize: vertical;
    }

    #mijia-passcode-panel .textarea-shell .textarea-input {
      display: block;
      width: 100%;
      min-height: 140px;
      padding: 12px 14px;
      border-radius: 20px;
      background: #444444;
      color: #ffffff;
      caret-color: #ffffff;
      -webkit-text-fill-color: #ffffff;
      tab-size: 2;
      resize: vertical;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.26) transparent;
    }

    #mijia-passcode-panel .link-box {
      min-height: 60px;
      padding: 10px 10px 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #mijia-passcode-panel .url-link {
      flex: 1;
      min-width: 0;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2f7cff;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-align: center;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #mijia-passcode-panel .url-link:not([href]) {
      color: rgba(255, 255, 255, 0.72);
      text-decoration: none;
      cursor: default;
    }

    #mijia-passcode-panel .url-refresh-button {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      flex: 0 0 34px;
      align-self: center;
      margin: 0;
    }

    #mijia-passcode-panel .passcode-box {
      min-height: 76px;
      padding: 0 12px 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #mijia-passcode-panel .passcode-value {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-size: 24px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #mijia-passcode-panel .passcode-slot {
      width: 1ch;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 1ch;
    }

    #mijia-passcode-panel .passcode-value.is-muted {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.72);
    }

    #mijia-passcode-panel .passcode-actions {
      display: flex;
      flex-direction: row;
      gap: 8px;
    }

    #mijia-passcode-panel .action-button,
    #mijia-passcode-panel .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    #mijia-passcode-panel .inline-icon-button {
      position: relative;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.88);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    #mijia-passcode-panel .inline-icon-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
    }

    #mijia-passcode-panel .inline-icon-button::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      padding: 6px 10px;
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(14, 14, 14, 0.96);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.26);
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #mijia-passcode-panel .inline-icon-button:hover::after,
    #mijia-passcode-panel .inline-icon-button:focus-visible::after {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    #mijia-passcode-panel .action-button {
      padding: 10px 12px;
      font-size: 13px;
    }

    #mijia-passcode-panel .secondary-button {
      padding: 11px 14px;
      font-size: 14px;
    }

    #mijia-passcode-panel .primary-button {
      width: auto;
      min-width: 220px;
      max-width: 100%;
      align-self: center;
      padding: 12px 18px;
      border-radius: 999px;
      color: #ffffff;
      font-size: 15px;
      background: linear-gradient(180deg, #2e95ff 0%, #1b7ff0 100%);
    }

    #mijia-passcode-panel .secondary-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #mijia-passcode-panel .status {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.68);
      display: none;
    }

    #mijia-passcode-panel .status-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      z-index: 2147483647;
      max-width: min(560px, calc(100vw - 32px));
      padding: 12px 18px;
      border-radius: 999px;
      color: #ffffff;
      background: rgba(14, 14, 14, 0.92);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
      transform: translate(-50%, -14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
    }

    #mijia-passcode-panel .status-toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    #mijia-passcode-panel details {
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }

    #mijia-passcode-panel summary {
      padding: 12px 14px;
      cursor: pointer;
      list-style: none;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.82);
    }

    #mijia-passcode-panel pre {
      margin: 0;
      padding: 0 14px 14px;
      white-space: pre-wrap;
      word-break: break-word;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      line-height: 1.6;
    }

    #mijia-passcode-panel .icon-inline,
    #mijia-passcode-panel .title-badge svg,
    #mijia-passcode-panel .field-label svg,
    #mijia-passcode-panel .modal-title svg,
    #mijia-passcode-panel .header-button svg,
    #mijia-passcode-panel .inline-icon-button svg,
    #mijia-passcode-panel .action-button svg,
    #mijia-passcode-panel .secondary-button svg,
    #mijia-passcode-panel .modal-close svg {
      width: 15px;
      height: 15px;
      flex: 0 0 15px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #mijia-passcode-panel .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }

    #mijia-passcode-panel .modal-overlay.is-open {
      display: flex;
    }

    #mijia-passcode-panel .modal-dialog {
      width: min(560px, calc(100vw - 24px));
      max-height: calc(100vh - 40px);
      overflow: auto;
      border-radius: 24px;
      background: #171717;
      box-shadow: 0 28px 72px rgba(0, 0, 0, 0.42);
    }

    #mijia-passcode-panel .modal-inner {
      display: grid;
      gap: 16px;
      padding: 22px 20px 20px;
    }

    #mijia-passcode-panel .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #mijia-passcode-panel .modal-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 700;
    }

    #mijia-passcode-panel .modal-close {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }

    #mijia-passcode-panel .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
  </style>
</head>

    <div class="status-toast" data-role="status-toast" aria-live="polite"></div>
  `;

  const fields = {
    requestUrl: panel.querySelector('[data-setting="requestUrl"]'),
    cookie: panel.querySelector('[data-setting="cookie"]'),

    userAgent: panel.querySelector('[data-setting="userAgent"]'),
    connection: panel.querySelector('[data-setting="connection"]'),
    acceptEncoding: panel.querySelector('[data-setting="acceptEncoding"]'),
    acceptLanguage: panel.querySelector('[data-setting="acceptLanguage"]'),
    operateCommon: panel.querySelector('[data-setting="operateCommon"]'),

  const passcodeNode = panel.querySelector('[data-role="passcode"]');

  const statusToastNode = panel.querySelector('[data-role="status-toast"]');

  // 将 curl 的自动识别绑定到输入框
  [fields.ipRequestBody, fields.passcodeRequestBody].forEach(input => {
    input.addEventListener('paste', (e) => {
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      if (pasted && pasted.trim().startsWith('curl')) {
        setTimeout(() => {
          try {
            const parsed = migrateCurlCommandToSettings(pasted);
            if (parsed && parsed.requestUrl) {
              const currentKind = input === fields.ipRequestBody ? 'url' : 'passcode';
              const toApply = { ...collectSettings(), ...parsed };
              
              if (currentKind === 'url') {
                toApply.ipRequestBody = parsed.ipRequestBody;
                toApply.passcodeRequestBody = fields.passcodeRequestBody.value; // 保留另一个
              } else {
                toApply.passcodeRequestBody = parsed.passcodeRequestBody;
                toApply.ipRequestBody = fields.ipRequestBody.value; // 保留另一个
              }

              applySettings(toApply);
              setStatus('已成功解析 CURL 请求');
            }
          } catch (e) {
            console.error('CURL 解析失败', e);
          }
        }, 100);
      }
    });
  });

  function readStorageValue(name) {
    try {
      return localStorage.getItem(name) || '';
    } catch(e) {
      return '';
    }
  }

  function writeStorageValue(name, value) {
    try {
      localStorage.setItem(name, value);
    } catch(e) {}
  }

  function deleteStorageValue(name) {
    try {
      localStorage.removeItem(name);
    } catch(e) {}
  }

  function normalizeSettings(settings) {
    const normalizedSettings = { ...defaultSettings };
    if (!settings || typeof settings !== 'object') {
      return normalizedSettings;
    }
    for (const key of Object.keys(defaultSettings)) {
      if (typeof settings[key] === 'string') {
        normalizedSettings[key] = settings[key];
      }
    }
    return normalizedSettings;
  }

  function encodeStoredSettings(settings) {
    return JSON.stringify({
      settings: normalizeSettings(settings)
    });
  }

  function readHeaderValue(headers, targetName) {
    const targetNameLower = targetName.toLowerCase();
    for (const [headerName, headerValue] of Object.entries(headers)) {
      if (headerName.toLowerCase() === targetNameLower) {
        return headerValue;
      }
    }
    return '';
  }

  function safeDecodeURIComponent(value) {
    try {
      return decodeURIComponent(value);
    } catch (error) {
      return value;
    }
  }

  function detectLegacyRequestKind(data) {
    const decodedData = safeDecodeURIComponent(data || '');
    if (decodedData.includes('miIO.get_autowebconfig_url')) {
      return 'url';
    }
    if (decodedData.includes('miIO.get_central_link_passcode')) {
      return 'passcode';
    }
    return '';
  }

  function migrateCurlCommandToSettings(command) {
    if (!command) {
      return { ...defaultSettings };
    }
    try {
      const request = parseCurlCommand(command);
      const migratedSettings = {
        ...defaultSettings,
        requestUrl: request.url,
        cookie: readHeaderValue(request.headers, 'Cookie'),
        accept: readHeaderValue(request.headers, 'Accept') || defaultSettings.accept,
        contentType: readHeaderValue(request.headers, 'Content-Type') || defaultSettings.contentType,
        userAgent: readHeaderValue(request.headers, 'User-Agent'),
        connection: readHeaderValue(request.headers, 'Connection') || defaultSettings.connection,
        acceptEncoding: readHeaderValue(request.headers, 'Accept-Encoding') || defaultSettings.acceptEncoding,
        acceptLanguage: readHeaderValue(request.headers, 'Accept-Language') || defaultSettings.acceptLanguage,
        operateCommon: readHeaderValue(request.headers, 'operate-common'),
        originFrom: readHeaderValue(request.headers, 'Origin-From'),
        xiaomiProtocolFlagCli: readHeaderValue(request.headers, 'X-XIAOMI-PROTOCAL-FLAG-CLI')
      };
      const requestKind = detectLegacyRequestKind(request.data);

      if (requestKind === 'url') {
        migratedSettings.ipRequestBody = request.data || '';
      } else if (requestKind === 'passcode') {
        migratedSettings.passcodeRequestBody = request.data || '';
      } else {
        migratedSettings.passcodeRequestBody = request.data || '';
      }

      return migratedSettings;
    } catch (error) {
      console.warn("Parse CURL Error:", error);
      return { ...defaultSettings };
    }
  }

  function decodeStoredSettings(rawValue) {
    if (!rawValue) {
      return { ...defaultSettings };
    }
    try {
      const parsedValue = JSON.parse(rawValue);
      if (parsedValue && typeof parsedValue === 'object') {
        if (parsedValue.settings && typeof parsedValue.settings === 'object') {
          return normalizeSettings(parsedValue.settings);
        }
        if (typeof parsedValue.curlCommand === 'string') {
          return migrateCurlCommandToSettings(parsedValue.curlCommand);
        }
      }
    } catch (error) {
      return migrateCurlCommandToSettings(rawValue);
    }
    return { ...defaultSettings };
  }

  function setStatus(message, showToast = true) {
    statusNode.textContent = message;
    if (!showToast) {
      statusToastNode.classList.remove('is-visible');
      return;
    }
    statusToastNode.textContent = message;
    statusToastNode.classList.add('is-visible');
    window.clearTimeout(statusToastTimer);
    statusToastTimer = window.setTimeout(() => {
      statusToastNode.classList.remove('is-visible');
    }, 2400);
  }

  function setPasscodeResult(value, isCode) {
    passcodeNode.className = `passcode-value${isCode ? '' : ' is-muted'}`;
    if (value === passcodePlaceholder || (isCode && /^\d{6}$/.test(String(value)))) {
      passcodeNode.innerHTML = renderPasscodeSlots(value);
      return;
    }
    passcodeNode.textContent = value;
  }

  function setRemoteUrl(value) {
    const nextValue = value || remoteUrlPlaceholder;
    const isHttpUrl = /^https?:\/\//i.test(nextValue);
    remoteUrlNode.textContent = nextValue;
    if (isHttpUrl) {
      remoteUrlNode.href = nextValue;
      return;
    }
    remoteUrlNode.removeAttribute('href');
  }

  function renderOutput() {
    const hasResponse =
      outputState.url !== responsePlaceholder ||
      outputState.passcode !== responsePlaceholder;
    if (!hasResponse) {
      outputNode.textContent = responsePlaceholder;
      return;
    }
    outputNode.textContent = [
      '[URL 接口响应]',
      outputState.url,
      '',
      '[登录码接口响应]',
      outputState.passcode
    ].join('\n');
  }

  function setOutputSection(section, value) {
    outputState[section] = value || responsePlaceholder;
    renderOutput();
  }

  function collectSettings() {
    return {
      requestUrl: fields.requestUrl.value.trim(),
      cookie: fields.cookie.value.trim(),
      ipRequestBody: fields.ipRequestBody.value.trim(),
      passcodeRequestBody: fields.passcodeRequestBody.value.trim(),
      accept: fields.accept.value.trim(),
      contentType: fields.contentType.value.trim(),
      userAgent: fields.userAgent.value.trim(),
      connection: fields.connection.value.trim(),
      acceptEncoding: fields.acceptEncoding.value.trim(),
      acceptLanguage: fields.acceptLanguage.value.trim(),
      operateCommon: fields.operateCommon.value.trim(),
      originFrom: fields.originFrom.value.trim(),
      xiaomiProtocolFlagCli: fields.xiaomiProtocolFlagCli.value.trim()
    };
  }

  function applySettings(settings) {
    const nextSettings = normalizeSettings(settings);
    fields.requestUrl.value = nextSettings.requestUrl;
    fields.cookie.value = nextSettings.cookie;
    fields.ipRequestBody.value = nextSettings.ipRequestBody;
    fields.passcodeRequestBody.value = nextSettings.passcodeRequestBody;
    fields.accept.value = nextSettings.accept;
    fields.contentType.value = nextSettings.contentType;
    fields.userAgent.value = nextSettings.userAgent;
    fields.connection.value = nextSettings.connection;
    fields.acceptEncoding.value = nextSettings.acceptEncoding;
    fields.acceptLanguage.value = nextSettings.acceptLanguage;
    fields.operateCommon.value = nextSettings.operateCommon;
    fields.originFrom.value = nextSettings.originFrom;
    fields.xiaomiProtocolFlagCli.value = nextSettings.xiaomiProtocolFlagCli;
  }

  function loadSettings() {
    return decodeStoredSettings(readStorageValue(storageKeys.requestConfig));
  }

  function saveSettings(settings) {
    writeStorageValue(storageKeys.requestConfig, encodeStoredSettings(settings));
  }

  function deleteSavedSettings() {
    deleteStorageValue(storageKeys.requestConfig);
  }

  function saveCurrentSettings(showMessage) {
    const settings = collectSettings();
    saveSettings(settings);
    if (showMessage) {
      setStatus('已保存');
    }
    return settings;
  }

  function clearResultState(showToast = true) {
    lastPasscode = '';
    lastRemoteUrl = '';
    setPasscodeResult(passcodePlaceholder, false);
    setRemoteUrl(remoteUrlPlaceholder);
    outputState.url = responsePlaceholder;
    outputState.passcode = responsePlaceholder;

    setStatus('URL 和登录码已清空', showToast);
  }

  function clearSavedSettings() {
    deleteSavedSettings();
    applySettings(defaultSettings);
    clearResultState(false);
    setStatus('已删除保存的设置');

  function escapeHtml(value) {
    return value
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderPasscodeSlots(passcode) {
    return String(passcode)
      .slice(0, 6)
      .split('')
      .map((char) => `<span class="passcode-slot">${escapeHtml(char)}</span>`)
      .join('');
  }

  // ============== CURL PARSING ===============
  function normalizeCurlCommand(command) {
    return command.replace(/\\\r?\n/g, ' ').replace(/\r?\n/g, ' ').trim();
  }

  function tokenizeShellCommand(command) {
    const tokens = [];
    let current = '';
    let inSingleQuote = false;
    let inDoubleQuote = false;
    let escaping = false;

    for (let index = 0; index < command.length; index += 1) {
      const char = command[index];
      if (escaping) { current += char; escaping = false; continue; }
      if (inSingleQuote) {
        if (char === "'") inSingleQuote = false; else current += char;
        continue;
      }
      if (inDoubleQuote) {
        if (char === '"') { inDoubleQuote = false; continue; }
        if (char === '\\') {
          const nextChar = command[index + 1];
          if (nextChar === '"' || nextChar === '\\' || nextChar === '$' || nextChar === '`') {
            current += nextChar; index += 1; continue;
          }
        }
        current += char; continue;
      }
      if (/\s/.test(char)) {
        if (current) { tokens.push(current); current = ''; }
        continue;
      }
      if (char === "'") { inSingleQuote = true; continue; }
      if (char === '"') { inDoubleQuote = true; continue; }
      if (char === '\\') { escaping = true; continue; }
      current += char;
    }
    if (escaping) current += '\\';
    if (current) tokens.push(current);
    return tokens;
  }

  function parseHeaderLine(headerLine, requestHeaders) {
    const separatorIndex = headerLine.indexOf(':');
    if (separatorIndex === -1) return;
    const headerName = headerLine.slice(0, separatorIndex).trim();
    const headerValue = headerLine.slice(separatorIndex + 1).trim();
    if (!headerName) return;
    requestHeaders[headerName] = headerValue;
  }

  function readOptionValue(tokens, index, optionName) {
    const value = tokens[index + 1];
    if (typeof value === 'undefined') throw new Error(`${optionName} 缺少值。`);
    return value;
  }

  function parseCurlCommand(command) {
    const normalizedCommand = normalizeCurlCommand(command);
    const tokens = tokenizeShellCommand(normalizedCommand);
    if (!tokens.length) throw new Error('请先粘贴 CURL 命令');
    const curlToken = tokens[0];
    if (!/(^|\/)curl(\.exe)?$/i.test(curlToken)) throw new Error('当前内容不是可识别的 CURL 命令');
    const request = { method: 'GET', url: '', headers: {}, data: undefined };
    let hasBody = false;

    for (let index = 1; index < tokens.length; index += 1) {
      const token = tokens[index];
      if (/^https?:\/\//i.test(token)) { request.url = token; continue; }
      if (token === '-X' || token === '--request') { request.method = readOptionValue(tokens, index, token).toUpperCase(); index += 1; continue; }
      if (token.startsWith('--request=')) { request.method = token.slice('--request='.length).toUpperCase(); continue; }
      if (token === '-H' || token === '--header') { parseHeaderLine(readOptionValue(tokens, index, token), request.headers); index += 1; continue; }
      if (token.startsWith('--header=')) { parseHeaderLine(token.slice('--header='.length), request.headers); continue; }
      if (token === '-d' || token === '--data' || token === '--data-raw' || token === '--data-binary' || token === '--data-ascii') {
        request.data = readOptionValue(tokens, index, token); hasBody = true; index += 1; continue;
      }
      if (token.startsWith('--data=') || token.startsWith('--data-raw=') || token.startsWith('--data-binary=') || token.startsWith('--data-ascii=')) {
        request.data = token.slice(token.indexOf('=') + 1); hasBody = true; continue;
      }
      if (token === '--url') { request.url = readOptionValue(tokens, index, token); index += 1; continue; }
      if (token.startsWith('--url=')) { request.url = token.slice('--url='.length); continue; }
      if (token === '-A' || token === '--user-agent') { request.headers['User-Agent'] = readOptionValue(tokens, index, token); index += 1; continue; }
      if (token.startsWith('--user-agent=')) { request.headers['User-Agent'] = token.slice('--user-agent='.length); continue; }
      if (token === '-b' || token === '--cookie') { request.headers.Cookie = readOptionValue(tokens, index, token); index += 1; continue; }
      if (token.startsWith('--cookie=')) { request.headers.Cookie = token.slice('--cookie='.length); continue; }
    }
    if (!request.url) throw new Error('未能从 CURL 命令中解析出请求地址');
    if (hasBody && request.method === 'GET') request.method = 'POST';
    return request;
  }
  // ============== END CURL PARSING ===============

  function appendHeaderIfPresent(headers, name, value) {
    if (value) { headers[name] = value; }
  }

  function buildCommonRequestConfig(settings, requestBody) {
    const requestUrlObject = new URL(settings.requestUrl);
    const host = requestUrlObject.host;
    const headers = {
      // 浏览器中的 fetch 不允许直接设置 Host
      // 'Host': host,
      'domain-refer': host,
      'MIOT-REQUEST-MODEL': fixedHeaders.miotRequestModel
    };

    appendHeaderIfPresent(headers, 'Accept', settings.accept);
    appendHeaderIfPresent(headers, 'Content-Type', settings.contentType);
    // 某些浏览器允许手动设置 User-Agent，有的忽略
    // appendHeaderIfPresent(headers, 'User-Agent', settings.userAgent);
    appendHeaderIfPresent(headers, 'Accept-Language', settings.acceptLanguage);
    
    // 注意：fetch 会拦截 Cookie 头，只有部分环境/插件下生效
    appendHeaderIfPresent(headers, 'Cookie', settings.cookie);
    
    appendHeaderIfPresent(headers, 'operate-common', settings.operateCommon);
    appendHeaderIfPresent(headers, 'Origin-From', settings.originFrom);
    appendHeaderIfPresent(headers, 'X-XIAOMI-PROTOCAL-FLAG-CLI', settings.xiaomiProtocolFlagCli);

    return {
      method: 'POST',
      url: requestUrlObject.toString(),
      headers,
      data: requestBody
    };
  }

  function requestWithFetch(requestConfig) {
    return new Promise((resolve, reject) => {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => {
        controller.abort();
        reject({ type: 'timeout' });
      }, 30000);

      fetch('/api/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestConfig),
        signal: controller.signal
      }).then(async (response) => {
        clearTimeout(timeoutId);
        const jsonRes = await response.json();
        
        if (jsonRes.error) {
           throw new Error(jsonRes.error);
        }

        let headersStr = '';
        if (jsonRes.headers) {
          for (const [key, val] of Object.entries(jsonRes.headers)) {
            headersStr += `${key}: ${val}\r\n`;
          }
        }
        resolve({
          responseText: jsonRes.data,
          responseHeaders: headersStr
        });
      }).catch(error => {
        clearTimeout(timeoutId);
        if (error.name === 'AbortError') {
          reject({ type: 'timeout' });
        } else {
          console.error("Proxy Fetch Error:", error);
          reject({
            type: 'error',
            detail: error.message || '网络请求失败，请检查后端代理服务是否正常运行'
          });
        }
      });
    });
  }

  function parseResponseAsJson(responseText, responseHeaders) {
    const contentTypeLine = responseHeaders
      .split(/\r?\n/)
      .find((line) => line.toLowerCase().startsWith('content-type:'));
    const trimmedText = responseText.trim();
    const looksLikeJson = /^[\[{]/.test(trimmedText);
    const isJsonType = Boolean(contentTypeLine && contentTypeLine.toLowerCase().includes('json'));

    if (!trimmedText || (!looksLikeJson && !isJsonType)) {
      return null;
    }
    try {
      return JSON.parse(trimmedText);
    } catch (error) {
      return null;
    }
  }

  function findPasscodeValue(value) {
    if (value === null || typeof value === 'undefined') return '';
    if (typeof value === 'string' || typeof value === 'number') return String(value);
    if (Array.isArray(value)) {
      for (const item of value) {
        const nestedValue = findPasscodeValue(item);
        if (nestedValue) return nestedValue;
      }
      return '';
    }
    if (typeof value === 'object') {
      for (const key of passcodeKeys) {
        if (Object.prototype.hasOwnProperty.call(value, key)) {
          const directValue = findPasscodeValue(value[key]);
          if (directValue) return directValue;
        }
      }
      for (const child of Object.values(value)) {
        const nestedValue = findPasscodeValue(child);
        if (nestedValue) return nestedValue;
      }
    }
    return '';
  }

  function findUrlValue(value) {
    if (value === null || typeof value === 'undefined') return '';
    if (typeof value === 'string') {
      const trimmedValue = value.trim();
      const urlMatch = trimmedValue.match(/https?:\/\/[^\s"'<>]+/i);
      return urlMatch ? urlMatch[0] : '';
    }
    if (Array.isArray(value)) {
      for (const item of value) {
        const nestedValue = findUrlValue(item);
        if (nestedValue) return nestedValue;
      }
      return '';
    }
    if (typeof value === 'object') {
      const directKeys = ['url', 'ipUrl', 'ip_url', 'link', 'autowebconfig_url', 'webConfigUrl'];
      for (const key of directKeys) {
        if (Object.prototype.hasOwnProperty.call(value, key)) {
          const directValue = findUrlValue(value[key]);
          if (directValue) return directValue;
        }
      }
      for (const child of Object.values(value)) {
        const nestedValue = findUrlValue(child);
        if (nestedValue) return nestedValue;
      }
    }
    return '';
  }

  function formatResponseText(responseText, parsedJson) {
    if (!parsedJson) return responseText || responsePlaceholder;
    return JSON.stringify(parsedJson, null, 2);
  }

  function getRequestPreset(kind) {
    if (kind === 'url') {
      return {
        bodyKey: 'ipRequestBody', outputKey: 'url', loadingText: 'URL 获取中...', missingText: '请先填写 URL 接口 POST 数据', triggerLabel: 'URL', successText: 'URL 已刷新', emptyText: 'URL 未获取到，请检查 URL 接口 POST 数据'
      };
    }
    return {
      bodyKey: 'passcodeRequestBody', outputKey: 'passcode', loadingText: '登录码获取中...', missingText: '请先填写登录码 POST 数据', triggerLabel: '登录码', successText: '登录码已刷新', emptyText: '登录码未获取到，请检查登录码 POST 数据'
    };
  }

  function resetRequestDisplay(kind) {
    if (kind === 'url') {
      lastRemoteUrl = ''; setRemoteUrl(remoteUrlPlaceholder); setOutputSection('url', responsePlaceholder); return;
    }
    lastPasscode = ''; setPasscodeResult(passcodePlaceholder, false); setOutputSection('passcode', responsePlaceholder);
  }

  async function executeSavedPost(kind, triggerSource) {
    const settings = saveCurrentSettings(false);
    const requestPreset = getRequestPreset(kind);
    const requestBody = settings[requestPreset.bodyKey];

    if (!settings.requestUrl) {
      resetRequestDisplay(kind); setStatus('没有 URL，请先填写'); return;
    }
    if (!requestBody) {
      resetRequestDisplay(kind); setStatus(requestPreset.missingText); return;
    }

    let commonRequestConfig;
    try {
      commonRequestConfig = buildCommonRequestConfig(settings, '');
    } catch (error) {
      resetRequestDisplay(kind); setStatus('URL 格式不正确'); return;
    }

    if (kind === 'url') {
      lastRemoteUrl = ''; setRemoteUrl(requestPreset.loadingText);
    } else {
      lastPasscode = ''; setPasscodeResult(requestPreset.loadingText, false);
    }

    setOutputSection(requestPreset.outputKey, '请求中...');
    setStatus(`${triggerSource}，正在请求${requestPreset.triggerLabel}...`);

    try {
      const response = await requestWithFetch({
        ...commonRequestConfig,
        data: requestBody
      });
      const parsedJson = parseResponseAsJson(response.responseText, response.responseHeaders || '');
      const formattedText = formatResponseText(response.responseText, parsedJson);

      setOutputSection(requestPreset.outputKey, formattedText);

      if (kind === 'url') {
        const remoteUrl = findUrlValue(parsedJson?.result ?? parsedJson ?? response.responseText);
        if (remoteUrl) {
          lastRemoteUrl = remoteUrl; setRemoteUrl(remoteUrl); setStatus(requestPreset.successText); return;
        }
        lastRemoteUrl = ''; setRemoteUrl(remoteUrlPlaceholder); setStatus(requestPreset.emptyText); return;
      }

      const passcode = parsedJson ? findPasscodeValue(parsedJson.result?.passcode ?? parsedJson.passcode ?? parsedJson) : '';
      if (passcode) {
        lastPasscode = passcode; setPasscodeResult(passcode, true); setStatus(requestPreset.successText); return;
      }

      lastPasscode = ''; setPasscodeResult('未提取到 passcode', false); setStatus(requestPreset.emptyText);
    } catch (error) {
      if (kind === 'url') {
        lastRemoteUrl = ''; setRemoteUrl(remoteUrlPlaceholder);
      } else {
        lastPasscode = ''; setPasscodeResult(error?.type === 'timeout' ? '请求超时' : '请求失败', false);
      }
      setOutputSection(requestPreset.outputKey, typeof error.detail === 'string' ? error.detail : JSON.stringify(error.detail || error));
      setStatus(`${requestPreset.triggerLabel}请求失败`);
    }
  }

  function copyPasscodeToClipboard(showStatus) {
    if (!lastPasscode) {
      if (showStatus) setStatus('当前没有可复制的登录码');
      return Promise.resolve(false);
    }

    if (navigator.clipboard?.writeText) {
      return navigator.clipboard.writeText(lastPasscode)
        .then(() => {
          if (showStatus) setStatus('登录码已复制到剪贴板');
          return true;
        })
        .catch(() => {
          // 备选方案
          const textArea = document.createElement("textarea");
          textArea.value = lastPasscode;
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            document.execCommand('copy');
            if (showStatus) setStatus('登录码已复制到剪贴板');
            document.body.removeChild(textArea);
            return true;
          } catch (err) {
            if (showStatus) setStatus('复制失败，请手动复制');
            document.body.removeChild(textArea);
            return false;
          }
        });
    }

    if (showStatus) setStatus('当前环境不支持自动复制');
    return Promise.resolve(false);
  }

  function copyPasscode() {
    copyPasscodeToClipboard(true);
  }

  function openSettingsModal() {
    settingsModalNode.classList.add('is-open');
  }

  function closeSettingsModal() {
    settingsModalNode.classList.remove('is-open');
  }

  settingsModalNode.addEventListener('click', (event) => {
    if (event.target === settingsModalNode) {
      closeSettingsModal();
    }
  });

  panel.addEventListener('click', (event) => {
    const actionNode = event.target instanceof Element ? event.target.closest('[data-action]') : null;
    const action = actionNode?.getAttribute('data-action');

    if (action === 'open-settings') { openSettingsModal(); return; }
    if (action === 'save') { saveCurrentSettings(true); closeSettingsModal(); return; }
    if (action === 'clear-saved') { clearSavedSettings(); return; }
    if (action === 'clear') { clearResultState(); return; }
    if (action === 'close-settings') { closeSettingsModal(); return; }
    if (action === 'fetch-url') { executeSavedPost('url', '手动获取 URL'); return; }
    if (action === 'fetch-passcode') { executeSavedPost('passcode', '手动获取登录码'); return; }
    if (action === 'copy') { copyPasscode(); return; }
    if (action === 'upload-har') { fileInput.click(); return; }
  });

  // ========== HAR & File parsing logic ==========
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.har,.json,.txt';
  fileInput.style.display = 'none';
  document.body.appendChild(fileInput);

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) handleHarUpload(file);
    fileInput.value = '';
  });
  
  const dropOverlay = document.createElement('div');
  dropOverlay.innerHTML = '<div style="font-size:24px; font-weight:bold;">松开鼠标，导入抓包文件</div>';
  Object.assign(dropOverlay.style, {
    position: 'fixed', inset: 0, zIndex: 2147483647, background: 'rgba(47, 124, 255, 0.85)', color: '#fff', 
    display: 'none', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(8px)'
  });
  document.body.appendChild(dropOverlay);

  let dragCounter = 0;
  window.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    dropOverlay.style.display = 'flex';
  });
  window.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter === 0) dropOverlay.style.display = 'none';
  });
  window.addEventListener('dragover', (e) => {
    e.preventDefault();
  });
  window.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.style.display = 'none';
    const file = e.dataTransfer?.files?.[0];
    if (file) handleHarUpload(file);
  });

  function handleHarUpload(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const text = e.target.result;
        let parsed = null;
        try {
          parsed = JSON.parse(text);
        } catch(err) {
          // 纯文本抓包扫描（例如有些抓包工具导出纯文本包含 curl）
          const newSettings = migrateCurlCommandToSettings(text);
          if (newSettings && newSettings.requestUrl) {
            applySettings(newSettings);
            saveCurrentSettings(false);
            setStatus('成功通过文本识别填充了部分请求参数');
          } else {
            setStatus('文件不是有效的 JSON/HAR 格式，且未识别出请求文本');
          }
          return;
        }
        
        if (parsed?.log?.entries) {
          parseHarEntries(parsed.log.entries);
        } else {
          setStatus('解析 JSON 成功，但没有找到标准 HAR 的 log.entries 结构');
        }
      } catch (err) {
        setStatus('解析文件失败: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

  function parseHarEntries(entries) {
    let foundAny = false;
    let foundUrl = false;
    let foundPasscode = false;
    let newSettings = collectSettings();

    for (const entry of entries) {
      if (!entry.request) continue;
      const req = entry.request;
      // 过滤只处理小米相关域名
      if (!req.url || (!req.url.includes('mijia.tech') && !req.url.includes('api.io.mi.com'))) continue;
      
      foundAny = true;
      const findHeader = (name) => req.headers?.find(h => h.name.toLowerCase() === name.toLowerCase())?.value || '';
      
      // 只要是小米的请求，就尽力提取最新的 Cookie 和 Headers
      newSettings.cookie = findHeader('Cookie') || newSettings.cookie;
      newSettings.accept = findHeader('Accept') || newSettings.accept;
      newSettings.contentType = findHeader('Content-Type') || newSettings.contentType;
      newSettings.userAgent = findHeader('User-Agent') || newSettings.userAgent;
      newSettings.operateCommon = findHeader('operate-common') || newSettings.operateCommon;
      newSettings.originFrom = findHeader('Origin-From') || newSettings.originFrom;
      newSettings.xiaomiProtocolFlagCli = findHeader('X-XIAOMI-PROTOCAL-FLAG-CLI') || newSettings.xiaomiProtocolFlagCli;

      if (req.method !== 'POST') continue;
      
      const postText = req.postData?.text || '';
      if (!postText) continue;

      const kind = detectLegacyRequestKind(postText);
      const isRpc = req.url.includes('/app/home/rpc');

      // 如果有明确特征或者是 rpc 请求，就提取 URL 和 POST Body
      if (kind === 'url') {
        foundUrl = true;
        newSettings.requestUrl = req.url;
        newSettings.ipRequestBody = postText;
      } else if (kind === 'passcode' || isRpc) {
        // 如果是加密的 rpc 请求，默认认为是 passcode 请求（因为通常抓的最后一个 rpc 就是 passcode）
        foundPasscode = true;
        newSettings.requestUrl = req.url;
        newSettings.passcodeRequestBody = postText;
      } else {
        // 如果都不是，但还没有任何数据，就暂时当做 passcode 兜底填入，但不标记找到了（防止误导）
        if (!newSettings.requestUrl) newSettings.requestUrl = req.url;
        if (!newSettings.passcodeRequestBody) newSettings.passcodeRequestBody = postText;
      }
    }

    if (foundUrl || foundPasscode) {
      applySettings(newSettings);
      saveCurrentSettings(false);
      setStatus(`成功解析抓包文件：识别到 ${[foundUrl ? 'URL' : '', foundPasscode ? '登录码' : ''].filter(Boolean).join(' 和 ')} 请求参数`);
    } else if (foundAny) {
      applySettings(newSettings);
      saveCurrentSettings(false);
      setStatus('提取了 Cookie 等认证信息，但未找到匹配的 RPC 请求，请确保抓取了正确的登录码接口。');
    } else {
      setStatus('抓包文件中未找到任何小米 (mijia.tech) 相关的请求数据。');
    }
  }

  applySettings(loadSettings());
  setRemoteUrl(remoteUrlPlaceholder);
  clearResultState(false);
  
})();
</script>

</body>
</html>
